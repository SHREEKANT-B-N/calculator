<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" aria-label="Calculator display" disabled/>
        <div class="buttons">
            <button aria-label="Clear" id="clear">AC</button>
            <button aria-label="Delete last entry" id="delete">DEL</button>
            <button aria-label="Memory Clear" id="memoryClear">MC</button>
            <button aria-label="Memory Recall" id="memoryRecall">MR</button>
            <button aria-label="Memory Add" id="memoryAdd">M+</button>
            <button aria-label="Memory Subtract" id="memorySubtract">M-</button>
            <button aria-label="Operations">÷</button>
            <button aria-label="Operations">×</button>
            <button aria-label="7">7</button>
            <button aria-label="8">8</button>
            <button aria-label="9">9</button>
            <button aria-label="4">4</button>
            <button aria-label="5">5</button>
            <button aria-label="6">6</button>
            <button aria-label="1">1</button>
            <button aria-label="2">2</button>
            <button aria-label="3">3</button>
            <button aria-label="0">0</button>
            <button aria-label="Decimal point">.</button>
            <button aria-label="Equals" id="equals">=</button>
            <button aria-label="Toggle sign">±</button>
            <button aria-label="Percent">%</button>
            <button aria-label="Open parenthesis">(</button>
            <button aria-label="Close parenthesis">)</button>
        </div>
    </div>
    <script src="scripts/app.js"></script>
</body>
</html>
